<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSM - Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-container" class="auth-box">
        <div class="auth-header">
            <h2>KSM</h2>
            <p>Login or Sign Up to start smiling</p>
        </div>
        <div class="auth-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="enter your email..." required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="enter your password..." required>
            </div>
            <div class="auth-buttons">
                <button id="login-btn" class="btn btn-primary">Log In</button>
                <button type="button" disabled id="signup-btn" class="btn btn-secondary">Sign Up</button>
            </div>
        </div>
    </div>
    <div id="keyword-container" class="auth-box" style="display:none;">
        <div class="auth-header">
            <h2>🔐 Private Access</h2>
            <p>Enter secret keyword to continue</p>
        </div>
        <div class="auth-form">
            <div class="input-group">
                <label>Secret Keyword</label>
                <input
                type="password"
                id="secret-keyword"
                placeholder="Enter keyword..."
            ></div>
        </div>

        <button
            id="keyword-submit-btn"
            class="btn btn-primary"
        >Continue
        </button>
    </div>


    <div id="chat-container" class="chat-dashboard" style="display: none;">
        
        <div class="sidebar-users">
            <div class="sidebar-header">
                <h3>People</h3>
            </div>
            <div id="users-list" class="users-bubble-container">
                </div>
        </div>

        <div class="chat-main-frame">
            <div class="chat-header">
                <div class="user-info">
                    <div id="active-user-avatar" class="avatar">💬</div>
                    <div>
                        <h3 id="current-chat-title">Select a person from the list to chat, bro!</h3>
                        <span id="user-display-email" class="status">Logged in as: ...</span>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button id="voice-call-btn" class="btn-call" disabled>📞 Call</button>
                    <button id="video-call-btn" class="btn-call" disabled>🎥 Video</button>
                    <button id="clear-chat-btn" class="btn-clear" style="display: none;">Clear Chat</button>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </div>

            <div id="chat-window" class="chat-messages">
                <div class="system-message">Select an active friend bubble from the left side to load history, bro!</div>
            </div>

            <div class="chat-input-area">
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                
                <button id="attach-btn" class="btn-attach" title="Attach Photo">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 8.86l-3 3.87L9 13.14 6 17h12l-3.86-5.14z"></path>
                    </svg>
                </button>

                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled>
                
                <button id="voice-btn" class="btn-voice" title="Record Voice Message" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"></path>
                    </svg>
                </button>
                
                <button id="send-btn" class="btn-send" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M1.101 21.757L23.8 12.028 1.101 2.3 l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
                    </svg>
                </button>
            </div>
        </div>

    </div>
    <div id="incoming-call-popup" class="call-popup" style="display:none;">
        <div class="call-box">
            <h3 id="incoming-call-text">Incoming voice call...</h3>
            <div class="call-actions">
                <button id="accept-call-btn" class="accept-call">Accept</button>
                <button id="reject-call-btn" class="reject-call">Reject</button>
            </div>
        </div>
    </div>
    <div id="active-call-bar" class="active-call-bar" style="display:none;">
        <span id="active-call-text">Voice call active</span>
        <button id="end-call-btn">End Call</button>
    </div>

    <div id="video-call-container" class="video-call-container" style="display:none;">
        <div class="video-box">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay muted playsinline></video>
            <div class="video-call-actions">
                <span id="video-call-text">Video call active</span>
                <button id="end-video-call-btn">End Video</button>
            </div>
        </div>
    </div>


    <audio id="remote-audio" autoplay></audio>

    <script type="module" src="app.js"></script>
</body>
</html>
